<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>당근 중고거래 · 페르소나별 TOP8 매물 (Supabase Cloud)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 기존 스타일 그대로 유지 (생략 없이 동일하게 적용됨) */
:root{--o:#FF6F0F;--ol:#FFF3EA;--od:#D45A00;--bg:#F5F5F5;--w:#fff;--t:#1A1A1A;--s:#767676;--b:#E8E8E8;--sh:0 2px 16px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hd{background:var(--o);padding:18px 20px;display:flex;justify-content:center;position:sticky;top:0;z-index:200}
.hd-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:860px}
.hd-btn{display:flex;align-items:center;justify-content:center;gap:10px;min-width:168px;padding:12px 22px;border:none;border-radius:18px;font-size:20px;font-weight:900;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;transition:.15s}
.hd-btn.on{background:#fff;color:var(--o);transform:scale(1.05);box-shadow:0 10px 22px rgba(0,0,0,.12)}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}
.databar{background:var(--w);border-radius:14px;padding:14px 20px;margin-bottom:22px;display:flex;overflow-x:auto;box-shadow:var(--sh)}
.db-group{flex:0 0 auto;display:flex;flex-direction:column;padding:0 20px}
.db-grp-lbl{font-size:10px;font-weight:700;color:var(--s);margin-bottom:8px}
.db-grp-items{display:flex;gap:16px}
.db-val{font-size:18px;font-weight:900;color:var(--o)}
.db-lbl{font-size:10px;color:var(--s)}
.sec-lbl{font-size:13px;font-weight:700;color:#6B6B6B;margin-bottom:12px;text-transform:uppercase}
#normalLayout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:24px;align-items:start}
.main-block{background:var(--w);border-radius:18px;padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.p-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.p-card{background:var(--w);border:2px solid var(--b);border-radius:16px;padding:16px;cursor:pointer;transition:.15s}
.p-card.on{border-color:var(--o);background:var(--ol)}
.p-em{font-size:30px;margin-bottom:6px}
.p-nm{font-size:14px;font-weight:800}
.v-row{display:flex;flex-wrap:wrap;gap:10px}
.v-tab{padding:12px 18px;border:1.5px solid var(--b);border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;background:var(--w);color:var(--s)}
.v-tab.on{background:var(--o);color:#fff;border-color:var(--o)}
.tc-sec{background:var(--w);border-radius:18px;padding:14px;box-shadow:var(--sh);position:sticky;top:100px}
.tc-chip{display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid var(--b);border-radius:12px;margin-bottom:10px;cursor:pointer}
.tc-chip.on{border-color:var(--o);background:var(--ol)}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ic{background:var(--w);border-radius:14px;box-shadow:var(--sh);padding:12px;position:relative;border:1px solid var(--b)}
.ic-rank{font-size:12px;font-weight:900;color:var(--o)}
.ic-nm{font-size:15px;font-weight:800;margin:4px 0}
.ic-p{font-size:18px;font-weight:900;color:var(--o)}
.ic-btn{display:block;text-align:center;background:#5A5A5A;color:#fff;padding:10px;border-radius:10px;text-decoration:none;margin-top:10px;font-size:12px;font-weight:800}
.fab{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--o);color:#fff;border:none;border-radius:30px;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:none;align-items:center;justify-content:center}
.mo.on{display:flex}
.mo-box{background:var(--w);border-radius:20px;padding:24px;width:100%;max-width:500px}
.mo-inp{width:100%;padding:12px;margin-top:8px;border:1.5px solid var(--b);border-radius:10px}
.mo-btn{width:100%;padding:14px;background:var(--o);color:#fff;border:none;border-radius:12px;margin-top:16px;cursor:pointer;font-weight:800}
.del-btn{position:absolute;top:5px;right:5px;background:#E8291A;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-btns">
    <button class="hd-btn on" id="btn-normal" onclick="setView('normal')">🗂️ 기본 보기</button>
    <button class="hd-btn" id="btn-matrix" onclick="setView('matrix')">📋 표로 보기</button>
    <button class="hd-btn" id="btn-data" onclick="setView('data')">📊 데이터 보기</button>
  </div>
</header>

<div class="wrap">
  <div id="normalLayout">
    <div class="tc-sec" id="sideBar">
      <div class="sec-lbl">🏅 추천 조합 TOP 8</div>
      <div class="tc-row" id="topCombos"></div>
    </div>
    
    <div class="main-col">
      <div class="main-block">
        <div class="sec-lbl">페르소나 선택</div>
        <div class="p-row" id="personaRow"></div>
      </div>
      <div class="main-block">
        <div class="sec-lbl">버전 선택</div>
        <div class="v-row" id="versionRow"></div>
      </div>
      
      <div id="normalView">
        <div class="items-grid" id="itemsGrid"></div>
      </div>
    </div>
  </div>
  
  <div id="matrixView" style="display:none"></div>
  <div id="dataView" style="display:none"></div>
</div>

<button class="fab" id="fabMain" onclick="onFabClick()">✏️ 편집하기</button>

<div class="mo" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mo-box" id="modalBox"></div>
</div>

<script>
// --- [데이터 정의] ---
const PERSONAS = [
  { id:'p1', em:'💼', name:'절약왕 직장인', short:'28-35세 · 직장인' },
  { id:'p2', em:'👑', name:'워너비 패피', short:'22-30세 · MZ세대' }
];
const VERSIONS = [
  { id:'v1', label:'🏆 버전1 · 고가템' },
  { id:'v2', label:'🎯 버전2 · 저가템' }
];
let ITEMS = {};

// --- [Supabase 설정] ---
// TODO: 아래 본인의 프로젝트 정보를 입력하세요.
const SUPABASE_URL = 'sb_publishable_6remFFz9oGKffdlRakvdfg_OOLp6zYL'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ld295ZGVnZmJubnF1amdpaXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzgzOTIsImV4cCI6MjA5MTgxNDM5Mn0.NFTJeC1fHuYwodu1uoAVY7qr4P_KV1NbvXUyYNE3I8g';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- [핵심 로직: 클라우드 저장/로드] ---

// DB에서 데이터 불러오기
async function loadFromSupabase() {
  try {
    const { data, error } = await _supabase
      .from('site_data')
      .select('content')
      .eq('id', 1)
      .single();

    if (error) throw error;
    
    if (data && data.content && Object.keys(data.content).length > 0) {
      const d = data.content;
      // DB 데이터로 덮어쓰기
      if(d.personas) { PERSONAS.length=0; d.personas.forEach(p=>PERSONAS.push(p)); }
      if(d.versions) { VERSIONS.length=0; d.versions.forEach(v=>VERSIONS.push(v)); }
      if(d.items) ITEMS = d.items;
      console.log("Cloud data loaded successfully.");
    }
  } catch (e) {
    console.error("DB Load Error: 기본 데이터를 사용합니다.", e);
  }
}

// DB에 데이터 저장하기
async function saveAllToSupabase() {
  const payload = {
    personas: PERSONAS,
    versions: VERSIONS,
    items: ITEMS
  };

  const { error } = await _supabase
    .from('site_data')
    .upsert({ id: 1, content: payload, updated_at: new Date() });

  if (error) {
    alert("저장 실패: " + error.message);
  } else {
    isDirty = false;
    updateFab();
    const el = document.getElementById('fabMain');
    el.innerHTML = '✅ 클라우드 저장완료';
    setTimeout(() => { updateFab(); }, 1800);
  }
}

// --- [UI 및 상태 제어] ---
let curPersona = null;
let curVersion = null;
let curView = 'normal';
let editMode = false;
let isDirty = false;

function setView(v) {
  curView = v;
  document.getElementById('normalLayout').style.display = (v==='normal'?'grid':'none');
  document.getElementById('matrixView').style.display = (v==='matrix'?'block':'none');
  document.getElementById('dataView').style.display = (v==='data'?'block':'none');
}

function selectPersona(pid) {
  curPersona = pid;
  renderPersonaRow();
  renderItems();
}

function selectVersion(vid) {
  curVersion = vid;
  renderVersionRow();
  renderItems();
}

function renderPersonaRow() {
  const pr = document.getElementById('personaRow');
  pr.innerHTML = PERSONAS.map(p => `
    <div class="p-card ${curPersona===p.id?'on':''}" onclick="selectPersona('${p.id}')">
      <div class="p-em">${p.em}</div>
      <div class="p-nm">${p.name}</div>
      <div class="p-dsc">${p.short}</div>
      ${editMode ? `<button class="del-btn" onclick="event.stopPropagation();deletePersona('${p.id}')">×</button>` : ''}
    </div>
  `).join('');
}

function renderVersionRow() {
  const vr = document.getElementById('versionRow');
  vr.innerHTML = VERSIONS.map(v => `
    <button class="v-tab ${curVersion===v.id?'on':''}" onclick="selectVersion('${v.id}')">${v.label}</button>
  `).join('');
}

function renderItems() {
  const grid = document.getElementById('itemsGrid');
  if(!curPersona || !curVersion) { grid.innerHTML = '<p>페르소나와 버전을 선택하세요.</p>'; return; }
  
  const list = (ITEMS[curPersona] && ITEMS[curPersona][curVersion]) || [];
  grid.innerHTML = list.map((it, i) => `
    <div class="ic">
      <div class="ic-rank">${i+1}위</div>
      <div class="ic-nm">${it.nm}</div>
      <div class="ic-p">${it.p}</div>
      <a href="#" class="ic-btn">당근에서 보기</a>
      ${editMode ? `<button class="del-btn" onclick="deleteItem(${i})">×</button>` : ''}
    </div>
  `).join('');
  
  if(editMode) {
    grid.innerHTML += `<div class="ic" style="border:2px dashed #ccc; cursor:pointer; text-align:center" onclick="showAddItemModal()">+ 매물 추가</div>`;
  }
}

function onFabClick() {
  if(!editMode) {
    editMode = true;
    updateFab();
    renderPersonaRow();
    renderVersionRow();
    renderItems();
  } else {
    if(isDirty) {
      saveAllToSupabase();
    } else {
      editMode = false;
      updateFab();
      renderPersonaRow();
      renderVersionRow();
      renderItems();
    }
  }
}

function updateFab() {
  const el = document.getElementById('fabMain');
  if(!editMode) el.innerHTML = '✏️ 편집하기';
  else el.innerHTML = isDirty ? '💾 클라우드에 저장' : '✔️ 편집 종료';
}

function markDirty() { isDirty = true; updateFab(); }

// --- [모달 및 추가 기능] ---
function closeModal() { document.getElementById('modal').classList.remove('on'); }

function showAddItemModal() {
  document.getElementById('modalBox').innerHTML = `
    <h3>매물 추가</h3>
    <input id="mo-nm" class="mo-inp" placeholder="상품명">
    <input id="mo-p" class="mo-inp" placeholder="가격 (예: 15만원)">
    <button class="mo-btn" onclick="confirmAddItem()">추가하기</button>
  `;
  document.getElementById('modal').classList.add('on');
}

function confirmAddItem() {
  const nm = document.getElementById('mo-nm').value;
  const p = document.getElementById('mo-p').value;
  if(!ITEMS[curPersona]) ITEMS[curPersona] = {};
  if(!ITEMS[curPersona][curVersion]) ITEMS[curPersona][curVersion] = [];
  ITEMS[curPersona][curVersion].push({nm, p});
  closeModal();
  markDirty();
  renderItems();
}

function deleteItem(idx) {
  ITEMS[curPersona][curVersion].splice(idx, 1);
  markDirty();
  renderItems();
}

// --- [초기화] ---
async function init() {
  await loadFromSupabase(); // 1순위: DB에서 데이터 가져오기
  renderPersonaRow();
  renderVersionRow();
}

init();
</script>
</body>
</html>
